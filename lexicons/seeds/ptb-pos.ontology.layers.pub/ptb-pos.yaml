collection: pub.layers.ontology.ontology
record:
  $type: pub.layers.ontology.ontology
  name: Penn Treebank POS tagset (English, 36 tags)
  description: 'Penn Treebank POS tagset for English from Santorini (1990) and Marcus,
    Santorini & Marcinkiewicz (1993). De-facto baseline for English POS tagging; consumed
    by the WSJ corpus, Brown corpus PTB-style retags, and the bulk of contemporary
    tagger evaluation. Citation: https://catalog.ldc.upenn.edu/docs/LDC95T7/cl93.html'
  domain: general
  languages:
  - eng
  createdAt: '2026-05-06T00:00:00Z'
changelog:
  summary: 'Initial publish: PTB POS tagset'
