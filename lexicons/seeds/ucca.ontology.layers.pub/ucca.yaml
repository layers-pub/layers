  $type: pub.layers.ontology.typeDef
  ontologyRef: at://ucca.ontology.layers.pub/pub.layers.ontology.ontology/ucca-foundational
  name: Relator (R)
  typeKind: relation-type
  description: 'UCCA category R: A relational element that connects a Center to its
