collection: pub.layers.ontology.ontology
record:
  $type: pub.layers.ontology.ontology
  name: Plutchik primary emotions (8)
  description: 'The eight primary emotions of Plutchik''s psychoevolutionary wheel
    (Plutchik 1980, 2001). Arranged in four opposing pairs: joy↔sadness, trust↔disgust,
    fear↔anger, surprise↔anticipation. Often used as a coarse-grained alternative
    to GoEmotions for psychological-model-aligned annotation.'
  domain: general
  languages:
  - eng
  createdAt: '2026-05-06T00:00:00Z'
changelog:
  summary: 'Initial publish: Plutchik primary emotions'
