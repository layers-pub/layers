apiVersion: apps/v1
kind: Deployment
metadata:
  name: layers-api
  namespace: layers
  labels:
    app: layers-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: layers-api
  template:
    metadata:
      labels:
        app: layers-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: layers-api
      automountServiceAccountToken: false
      containers:
        - name: api
          image: layers-appview:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: layers-config
            - secretRef:
                name: layers-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 512Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: layers-api
  namespace: layers
  labels:
    app: layers-api
