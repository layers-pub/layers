apiVersion: apps/v1
kind: Deployment
metadata:
  name: layers-indexer
  namespace: layers
  labels:
    app: layers-indexer
    app.kubernetes.io/component: indexer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: layers-indexer
  template:
    metadata:
      labels:
        app: layers-indexer
        app.kubernetes.io/component: indexer
    spec:
      serviceAccountName: layers-indexer
      automountServiceAccountToken: false
      containers:
        - name: indexer
          image: layers-appview:latest
          command: ['dist/indexer.js']
          envFrom:
            - configMapRef:
                name: layers-config
            - secretRef:
                name: layers-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: layers-indexer
  namespace: layers
  labels:
    app: layers-indexer
