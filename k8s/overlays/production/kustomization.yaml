apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: layers

images:
  - name: layers-appview
    newName: ghcr.io/layers-pub/layers-appview
    newTag: latest # Replaced by CI/CD with git SHA

patches:
  # Increase API replicas and resource limits for production
  - target:
      kind: Deployment
      name: layers-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: layers-api
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi

  # Increase indexer resource limits for production
  - target:
      kind: Deployment
      name: layers-indexer
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: layers-indexer
      spec:
        template:
          spec:
            containers:
              - name: indexer
                resources:
                  requests:
                    cpu: "1"
                    memory: 1Gi
                  limits:
                    cpu: "4"
                    memory: 4Gi

  # Raise HPA ceiling for production traffic
  - target:
      kind: HorizontalPodAutoscaler
      name: layers-api-hpa
    patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: layers-api-hpa
      spec:
        minReplicas: 3
        maxReplicas: 20
